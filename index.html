<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Handwritten Notes Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Load Custom Handwriting Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Patrick+Hand&family=Indie+Flower&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-section textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: border 0.3s;
        }

        .input-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .options {
            display: grid;
            gap: 15px;
            margin-top: 15px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-group label {
            font-weight: 600;
            color: #333;
        }

        select, input[type="number"], input[type="color"] {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .color-picker {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #4CAF50;
            color: white;
        }

        .btn-secondary:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .preview-container {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            border: 2px dashed #ccc;
        }

        .page-preview {
            background: white;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        .page-number {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .loading.active {
            display: block;
        }

        .stats {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .stats p {
            margin: 5px 0;
            color: #555;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✍️ Text to Handwritten Notes</h1>
            <p>Convert your typed text into realistic handwritten notes</p>
        </div>

        <div class="main-content">
            <!-- Input Section -->
            <div class="card input-section">
                <h2>📝 Input Text</h2>
                <textarea id="inputText" placeholder="Type or paste your text here...

Example:
Chapter 1: Introduction

This is my handwritten note.
It will look realistic!

• Bullet points
• Multiple lines
• Automatic pages"></textarea>

                <div class="options">
                    <div class="option-group">
                        <label>📚 Font Style</label>
                        <select id="fontStyle">
                            <option value="'Caveat', cursive">✨ Caveat (Recommended)</option>
                            <option value="'Patrick Hand', cursive">✍️ Patrick Hand</option>
                            <option value="'Indie Flower', cursive">🌸 Indie Flower</option>
                            <option value="'Shadows Into Light', cursive">💫 Shadows Into Light</option>
                            <option value="'Segoe Print', cursive">📝 Segoe Print</option>
                            <option value="'Comic Sans MS', cursive">😊 Comic Sans</option>
                        </select>
                    </div>

                    <div class="option-group">
                        <label>📏 Font Size</label>
                        <input type="number" id="fontSize" value="24" min="16" max="36">
                    </div>

                    <div class="color-picker">
                        <div class="option-group">
                            <label>🖊️ Ink Color</label>
                            <input type="color" id="inkColor" value="#1a2a5e">
                        </div>
                        <div class="option-group">
                            <label>📄 Paper Color</label>
                            <input type="color" id="paperColor" value="#f8f8fa">
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="generateNotes()">
                    ✨ Generate Handwritten Notes
                </button>

                <div class="stats" id="stats" style="display: none;">
                    <p><strong>📊 Statistics:</strong></p>
                    <p>Characters: <span id="charCount">0</span></p>
                    <p>Lines: <span id="lineCount">0</span></p>
                    <p>Pages: <span id="pageCount">0</span></p>
                </div>
            </div>

            <!-- Preview Section -->
            <div class="card preview-section">
                <h2>👀 Preview</h2>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Generating your handwritten notes...</p>
                </div>

                <div class="preview-container" id="previewContainer">
                    <p style="text-align: center; color: #999; padding: 50px 20px;">
                        Your handwritten notes will appear here.<br>
                        Enter text and click "Generate" to start!
                    </p>
                </div>

                <div class="action-buttons" id="actionButtons" style="display: none;">
                    <button class="btn btn-secondary" onclick="downloadImages()">
                        📥 Download Images
                    </button>
                    <button class="btn btn-danger" onclick="downloadPDF()">
                        📄 Download PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let generatedPages = [];

        function generateNotes() {
            const text = document.getElementById('inputText').value;
            
            if (!text.trim()) {
                alert('⚠️ Please enter some text first!');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('previewContainer').innerHTML = '';

            // Get settings
            const fontStyle = document.getElementById('fontStyle').value;
            const fontSize = parseInt(document.getElementById('fontSize').value);
            const inkColor = document.getElementById('inkColor').value;
            const paperColor = document.getElementById('paperColor').value;

            // Generate pages after small delay for UI update
            setTimeout(() => {
                generateHandwrittenPages(text, fontStyle, fontSize, inkColor, paperColor);
            }, 100);
        }

        function generateHandwrittenPages(text, fontStyle, fontSize, inkColor, paperColor) {
            generatedPages = [];
            
            // A4 size canvas
            const pageWidth = 794;
            const pageHeight = 1123;
            const margin = 60;
            const lineHeight = fontSize * 1.8;
            const marginLineX = 80;

            const lines = text.split('\n');
            let currentPage = 1;
            let currentY = margin + 50;

            let canvas = createNotebookPage(pageWidth, pageHeight, paperColor, margin, marginLineX, lineHeight);
            let ctx = canvas.getContext('2d');

            for (let line of lines) {
                // Wrap long lines
                const words = line.split(' ');
                let currentLine = '';

                for (let word of words) {
                    const testLine = currentLine + word + ' ';
                    ctx.font = `${fontSize}px ${fontStyle}`;
                    const metrics = ctx.measureText(testLine);

                    if (metrics.width > pageWidth - margin - marginLineX - 40 && currentLine !== '') {
                        // Draw current line
                        drawHandwrittenText(ctx, currentLine.trim(), marginLineX + 20, currentY, fontSize, fontStyle, inkColor);
                        currentY += lineHeight;
                        currentLine = word + ' ';

                        // Check if new page needed
                        if (currentY > pageHeight - margin - 50) {
                            generatedPages.push(canvas);
                            currentPage++;
                            canvas = createNotebookPage(pageWidth, pageHeight, paperColor, margin, marginLineX, lineHeight);
                            ctx = canvas.getContext('2d');
                            currentY = margin + 50;
                        }
                    } else {
                        currentLine = testLine;
                    }
                }

                // Draw remaining text in line
                if (currentLine.trim() !== '') {
                    drawHandwrittenText(ctx, currentLine.trim(), marginLineX + 20, currentY, fontSize, fontStyle, inkColor);
                }
                
                currentY += lineHeight;

                // Check if new page needed
                if (currentY > pageHeight - margin - 50) {
                    generatedPages.push(canvas);
                    currentPage++;
                    canvas = createNotebookPage(pageWidth, pageHeight, paperColor, margin, marginLineX, lineHeight);
                    ctx = canvas.getContext('2d');
                    currentY = margin + 50;
                }
            }

            // Add last page
            if (currentY > margin + 50) {
                generatedPages.push(canvas);
            }

            // Display preview
            displayPreview();
            updateStats(text, lines.length, generatedPages.length);
        }

        function createNotebookPage(width, height, paperColor, margin, marginLineX, lineHeight) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // Paper background
            ctx.fillStyle = paperColor;
            ctx.fillRect(0, 0, width, height);

            // Add subtle paper texture
            for (let i = 0; i < 500; i++) {
                ctx.fillStyle = `rgba(0, 0, 0, ${Math.random() * 0.02})`;
                ctx.fillRect(Math.random() * width, Math.random() * height, 1, 1);
            }

            // Draw horizontal lines
            ctx.strokeStyle = 'rgba(150, 180, 220, 0.5)';
            ctx.lineWidth = 1;
            
            for (let y = margin + 50; y < height - margin; y += lineHeight) {
                ctx.beginPath();
                ctx.moveTo(margin, y);
                ctx.lineTo(width - margin, y);
                ctx.stroke();
            }

            // Draw margin line (red)
            ctx.strokeStyle = 'rgba(255, 180, 180, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(marginLineX, margin);
            ctx.lineTo(marginLineX, height - margin);
            ctx.stroke();

            return canvas;
        }

        function drawHandwrittenText(ctx, text, x, y, fontSize, fontStyle, inkColor) {
            ctx.font = `${fontSize}px ${fontStyle}`;
            ctx.fillStyle = inkColor;

            let currentX = x;

            for (let char of text) {
                // Add natural variations
                const xOffset = (Math.random() - 0.5) * 2;
                const yOffset = (Math.random() - 0.5) * 4;
                const rotation = (Math.random() - 0.5) * 0.05;

                ctx.save();
                ctx.translate(currentX + xOffset, y + yOffset);
                ctx.rotate(rotation);
                
                // Slight transparency variation
                ctx.globalAlpha = 0.85 + Math.random() * 0.15;
                ctx.fillText(char, 0, 0);
                ctx.restore();

                currentX += ctx.measureText(char).width + (Math.random() - 0.5) * 2;
            }
        }

        function displayPreview() {
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';

            generatedPages.forEach((canvas, index) => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page-preview';
                
                const pageNum = document.createElement('div');
                pageNum.className = 'page-number';
                pageNum.textContent = `Page ${index + 1}`;
                
                pageDiv.appendChild(pageNum);
                pageDiv.appendChild(canvas);
                container.appendChild(pageDiv);
            });

            document.getElementById('loading').classList.remove('active');
            document.getElementById('actionButtons').style.display = 'grid';
        }

        function updateStats(text, lineCount, pageCount) {
            document.getElementById('charCount').textContent = text.length;
            document.getElementById('lineCount').textContent = lineCount;
            document.getElementById('pageCount').textContent = pageCount;
            document.getElementById('stats').style.display = 'block';
        }

        function downloadImages() {
            generatedPages.forEach((canvas, index) => {
                const link = document.createElement('a');
                link.download = `handwritten-note-page-${index + 1}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
            
            alert(`✅ Downloaded ${generatedPages.length} image(s) successfully!`);
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');

            generatedPages.forEach((canvas, index) => {
                if (index > 0) {
                    pdf.addPage();
                }

                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
            });

            pdf.save('handwritten-notes.pdf');
            alert(`✅ PDF with ${generatedPages.length} page(s) downloaded successfully!`);
        }
    </script>
</body>
</html>
